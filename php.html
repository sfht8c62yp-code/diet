<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カロリーログ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Roboto+Mono:wght@500;600;700&display=swap');

:root{
  --bg:#EDF0F1;
  --surface:#FFFFFF;
  --surface-soft:#F5F7F7;
  --ink:#1B2430;
  --ink-soft:#5C6670;
  --accent:#2A6F77;
  --accent-deep:#1F565C;
  --warn:#C97B4A;
  --good:#4C8C6B;
  --line:#DCE1E2;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  font-family:'Zen Kaku Gothic New', sans-serif;
  color:var(--ink);
  min-height:100vh;
}
.mono{ font-family:'Roboto Mono', monospace; }
.app{ max-width:440px; margin:0 auto; padding:0 0 84px; }

.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 20px 6px;
}
.topbar h1{ font-size:17px; font-weight:700; margin:0; letter-spacing:0.02em; }
.topbar .date{ font-size:12px; color:var(--ink-soft); }
.iconbtn{
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--line); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink-soft); font-size:15px;
}

/* gauge */
.gauge-wrap{ display:flex; justify-content:center; padding:14px 0 6px; }
.gauge-center{ text-align:center; }
.gauge-center .balance{ font-size:34px; font-weight:700; line-height:1; }
.gauge-center .blabel{ font-size:11px; color:var(--ink-soft); margin-top:4px; letter-spacing:0.05em; }

.stat-row{
  display:flex; gap:10px; padding:14px 20px 4px;
}
.stat-card{
  flex:1; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; padding:11px 12px;
}
.stat-card .slabel{ font-size:11px; color:var(--ink-soft); }
.stat-card .sval{ font-size:19px; font-weight:600; margin-top:3px; }

.weight-card{
  margin:14px 20px 4px; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
}
.weight-card .wleft .wlabel{ font-size:11px; color:var(--ink-soft); }
.weight-card .wleft .wval{ font-size:20px; font-weight:600; margin-top:2px; }
.weight-card input{
  width:80px; padding:7px 8px; border:1px solid var(--line); border-radius:8px;
  font-family:'Roboto Mono', monospace; font-size:15px; text-align:right; background:var(--surface-soft); color:var(--ink);
}

.section-title{
  font-size:12px; color:var(--ink-soft); letter-spacing:0.06em;
  padding:18px 20px 8px; display:flex; align-items:center; gap:6px;
}
.section-title .bar{ width:3px; height:11px; background:var(--accent); display:inline-block; border-radius:2px; }

.meal-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:0 20px; }
.meal-btn{
  background:var(--surface); border:1px solid var(--line); border-radius:12px;
  padding:12px 4px; text-align:center; cursor:pointer;
}
.meal-btn .micon{ font-size:18px; }
.meal-btn .mname{ font-size:11px; margin-top:5px; color:var(--ink-soft); }

.meal-list{ padding:0 20px; }
.meal-item{
  background:var(--surface); border:1px solid var(--line); border-radius:12px;
  padding:12px 14px; margin-bottom:8px;
}
.meal-item .mhead{ display:flex; justify-content:space-between; align-items:center; }
.meal-item .mtag{ font-size:11px; color:#fff; background:var(--accent); padding:2px 9px; border-radius:8px; }
.meal-item .mtime{ font-size:11px; color:var(--ink-soft); }
.meal-item .mtotal{ font-size:16px; font-weight:600; margin-top:6px; }
.meal-item .mitems{ font-size:12px; color:var(--ink-soft); margin-top:4px; line-height:1.6; }
.meal-item .mdel{ float:right; color:var(--ink-soft); font-size:12px; cursor:pointer; border:1px solid var(--line); border-radius:8px; padding:3px 9px; background:var(--surface-soft); }

.empty{ text-align:center; color:var(--ink-soft); font-size:13px; padding:24px 20px; }

.advice-card{
  margin:14px 20px 4px; background:var(--accent-deep); color:#fff;
  border-radius:12px; padding:14px 16px;
}
.advice-card .alabel{ font-size:11px; opacity:0.75; letter-spacing:0.05em; }
.advice-card .atext{ font-size:13px; line-height:1.7; margin-top:6px; }
.advice-card .abtn{
  margin-top:10px; display:inline-block; font-size:12px; color:#fff;
  border:1px solid rgba(255,255,255,0.4); border-radius:14px; padding:6px 14px; cursor:pointer;
}
.meal-item .mcomment{ font-size:12px; color:var(--accent-deep); margin-top:6px; padding-top:6px; border-top:1px dashed var(--line); }

/* bottom nav */
.navbar{
  position:fixed; left:0; right:0; bottom:0;
  background:var(--surface); border-top:1px solid var(--line);
  display:flex; justify-content:center; z-index:5;
}
.navinner{ max-width:440px; width:100%; display:flex; }
.navitem{
  flex:1; text-align:center; padding:10px 0 12px; cursor:pointer;
  color:var(--ink-soft); font-size:11px;
}
.navitem .nicon{ font-size:18px; display:block; margin-bottom:2px; }
.navitem.active{ color:var(--accent); }

/* sparkline card */
.chart-card{
  margin:0 20px 4px; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; padding:14px;
}
.chart-card svg{ width:100%; height:90px; display:block; }

.list-row{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--surface); border:1px solid var(--line); border-radius:10px;
  padding:11px 14px; margin:0 20px 8px;
}
.list-row .lrow-date{ font-size:12px; color:var(--ink-soft); }
.list-row .lrow-w{ font-size:15px; font-weight:600; }
.list-row .lrow-cal{ font-size:12px; }

.form-block{ padding:0 20px; }
.form-block label{ display:block; font-size:12px; color:var(--ink-soft); margin:14px 0 5px; }
.form-block input, .form-block select{
  width:100%; padding:10px 11px; border:1px solid var(--line); border-radius:9px;
  font-family:'Zen Kaku Gothic New', sans-serif; font-size:14px; background:var(--surface); color:var(--ink);
}
.savebtn{
  margin:22px 20px 0; width:calc(100% - 40px); padding:12px; border:none;
  border-radius:10px; background:var(--accent); color:#fff; font-size:14px; font-weight:600; cursor:pointer;
}

/* sheet */
.sheet-overlay{
  position:fixed; inset:0; background:rgba(27,36,48,0.4);
  display:none; align-items:flex-end; justify-content:center; z-index:10;
}
.sheet-overlay.open{ display:flex; }
.sheet{
  width:100%; max-width:440px; max-height:82vh; overflow-y:auto;
  background:var(--surface); border-radius:20px 20px 0 0; padding:20px 20px 26px;
}
.sheet h3{ font-size:15px; font-weight:700; margin:0 0 14px; }
.sheet .row{
  display:flex; align-items:center; gap:10px; border:1px solid var(--line);
  border-radius:10px; padding:9px 11px; margin-bottom:8px;
}
.sheet .row input[type="text"]{ flex:1; border:none; font-size:13px; background:transparent; color:var(--ink); }
.sheet .row input[type="number"]{ width:64px; border:none; font-size:13px; text-align:right; background:transparent; color:var(--ink); font-family:'Roboto Mono',monospace; }
.sheet .rowdel{ color:var(--ink-soft); font-size:13px; cursor:pointer; }
.sheet-btns{ display:flex; gap:8px; margin-top:16px; }
.sheet-btns button{ flex:1; padding:11px; border-radius:10px; font-size:13px; border:1px solid var(--line); background:var(--surface-soft); cursor:pointer; color:var(--ink); }
.sheet-btns button.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
.sheet-note{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
.spinner-row{ text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:13px; }
.addrow{ text-align:center; font-size:12px; color:var(--accent); padding:6px 0 4px; cursor:pointer; }

.loading{ text-align:center; padding:60px 20px; color:var(--ink-soft); font-size:13px; }
input[type=file]{ display:none; }
</style>
</head>
<body>
<div id="root" class="loading">読み込み中…</div>
<input type="file" id="cameraInput" accept="image/*" capture="environment">

<script>
const MEAL_TYPES = [
  { id:'breakfast', label:'朝食', icon:'☀' },
  { id:'lunch', label:'昼食', icon:'☉' },
  { id:'dinner', label:'夕食', icon:'☾' },
  { id:'snack', label:'間食', icon:'+' }
];
const ACTIVITY_LEVELS = [
  { id:'1.2', label:'座り仕事中心・運動なし' },
  { id:'1.375', label:'軽い運動(週1-3回)' },
  { id:'1.55', label:'適度な運動(週3-5回)' },
  { id:'1.725', label:'激しい運動(週6-7回)' }
];

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(s){
  const [y,m,d] = s.split('-');
  return m+'/'+d;
}

let state = {
  profile: { age:35, gender:'male', heightCm:170, activity:'1.55' },
  days: {},
  view: 'home',
  currentDate: todayStr(),
  pendingMeal: null,
  adviceLoading: false
};

async function load(){
  try{
    const res = await window.storage.get('diet-tracker-state', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      if(parsed.profile) state.profile = parsed.profile;
      if(parsed.days) state.days = parsed.days;
    }
  }catch(e){}
  render();
}
async function save(){
  try{
    await window.storage.set('diet-tracker-state', JSON.stringify({ profile: state.profile, days: state.days }), false);
  }catch(e){ console.error('保存失敗', e); }
}

function getDay(dateStr){
  if(!state.days[dateStr]) state.days[dateStr] = { weight:null, meals:[] };
  return state.days[dateStr];
}

function bmr(weight){
  const p = state.profile;
  const base = 10*weight + 6.25*p.heightCm - 5*p.age;
  return p.gender === 'female' ? base - 161 : base + 5;
}
function tdee(weight){
  if(!weight) return null;
  return Math.round(bmr(weight) * parseFloat(state.profile.activity));
}
function dayIntake(dateStr){
  const day = getDay(dateStr);
  return day.meals.reduce((s,m)=>s+m.total,0);
}

function recentWeight(beforeOrEqual){
  const dates = Object.keys(state.days).filter(d=>state.days[d].weight!=null && d<=beforeOrEqual).sort();
  if(dates.length===0) return null;
  return state.days[dates[dates.length-1]].weight;
}

function render(){
  const root = document.getElementById('root');
  root.className = 'app';
  let html = '<div class="topbar"><div><h1>カロリーログ</h1><div class="date mono">' + state.currentDate + '</div></div>';
  html += '<div class="iconbtn" id="settingsBtn">⚙</div></div>';

  if(state.view === 'home') html += renderHome();
  else if(state.view === 'weight') html += renderWeight();
  else if(state.view === 'history') html += renderHistory();
  else if(state.view === 'settings') html += renderSettings();

  html += renderNav();
  html += renderSheet();

  root.innerHTML = html;
  attachEvents();
}

function renderGauge(intake, tdeeVal){
  const size = 168, stroke = 14, r = (size-stroke)/2, c = 2*Math.PI*r;
  let pct = tdeeVal ? Math.min(intake/tdeeVal, 1.3) : 0;
  const over = tdeeVal && intake > tdeeVal;
  const color = tdeeVal===null ? '#B9C0C2' : (over ? 'var(--warn)' : 'var(--accent)');
  const dash = c * Math.min(pct,1);
  const balance = tdeeVal===null ? null : intake - tdeeVal;
  return '<div class="gauge-wrap"><div style="position:relative;width:'+size+'px;height:'+size+'px;">'+
    '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)">'+
      '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="var(--line)" stroke-width="'+stroke+'" fill="none"/>'+
      '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="'+color+'" stroke-width="'+stroke+'" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+(c-dash)+'"/>'+
    '</svg>'+
    '<div class="gauge-center" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">'+
      '<div class="balance mono">'+(balance===null?'--':(balance>0?'+':'')+balance)+'</div>'+
      '<div class="blabel">'+(balance===null?'体重を入力してね':'kcal 収支')+'</div>'+
    '</div></div></div>';
}

function renderAdviceCard(day){
  if(state.adviceLoading){
    return '<div class="advice-card"><div class="alabel">今日のアドバイス</div><div class="atext">考え中…</div></div>';
  }
  if(day.advice){
    return '<div class="advice-card"><div class="alabel">今日のアドバイス</div><div class="atext">'+day.advice+'</div>'+
      '<div class="abtn" id="refreshAdvice">アドバイスを更新</div></div>';
  }
  return '<div class="advice-card"><div class="alabel">今日のアドバイス</div>'+
    '<div class="atext">今日の食事と体重の記録をもとに、AIがひとことアドバイスします。</div>'+
    '<div class="abtn" id="genAdvice">アドバイスをもらう</div></div>';
}

function renderHome(){
  const day = getDay(state.currentDate);
  const weight = day.weight;
  const intake = dayIntake(state.currentDate);
  const t = weight ? tdee(weight) : null;

  let html = renderGauge(intake, t);
  html += '<div class="stat-row">'+
    '<div class="stat-card"><div class="slabel">摂取カロリー</div><div class="sval mono">'+intake+'</div></div>'+
    '<div class="stat-card"><div class="slabel">消費カロリー(推定)</div><div class="sval mono">'+(t===null?'--':t)+'</div></div>'+
  '</div>';

  html += '<div class="weight-card"><div class="wleft"><div class="wlabel">今日の体重</div>'+
    '<div class="wval mono">'+(weight?weight+' kg':'未入力')+'</div></div>'+
    '<input type="number" step="0.1" id="quickWeight" placeholder="kg" value="'+(weight||'')+'"></div>';

  html += renderAdviceCard(day);

  html += '<div class="section-title"><span class="bar"></span>食事を記録</div>';
  html += '<div class="meal-grid">'+MEAL_TYPES.map(m=>'<div class="meal-btn" data-meal="'+m.id+'"><div class="micon">'+m.icon+'</div><div class="mname">'+m.label+'</div></div>').join('')+'</div>';

  html += '<div class="section-title"><span class="bar"></span>今日の食事</div>';
  if(day.meals.length===0){
    html += '<div class="empty">まだ記録がありません</div>';
  } else {
    html += '<div class="meal-list">' + day.meals.map(m=>{
      const mt = MEAL_TYPES.find(x=>x.id===m.mealType);
      return '<div class="meal-item"><div class="mhead"><span class="mtag">'+(mt?mt.label:'食事')+'</span><span class="mtime">'+m.time+'</span></div>'+
        '<div class="mtotal mono">'+m.total+' kcal</div>'+
        '<div class="mitems">'+m.items.map(it=>it.name+' '+it.calories+'kcal').join(' / ')+'</div>'+
        (m.comment ? '<div class="mcomment">'+m.comment+'</div>' : '') +
        '<div class="mdel" data-delmeal="'+m.id+'">削除</div></div>';
    }).join('') + '</div>';
  }
  return html;
}

function renderWeight(){
  const dates = Object.keys(state.days).filter(d=>state.days[d].weight!=null).sort().slice(-14);
  let chart = '';
  if(dates.length>=2){
    const vals = dates.map(d=>state.days[d].weight);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max-min) || 1;
    const w = 300, h = 70, pad=6;
    const pts = dates.map((d,i)=>{
      const x = pad + (i/(dates.length-1))*(w-2*pad);
      const y = h - pad - ((vals[i]-min)/range)*(h-2*pad);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    chart = '<div class="chart-card"><svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
      '<polyline points="'+pts+'" fill="none" stroke="var(--accent)" stroke-width="2"/></svg></div>';
  }
  let html = '<div class="section-title"><span class="bar"></span>体重の推移</div>' + (chart || '<div class="empty">2日分以上のデータで推移が表示されます</div>');
  const day = getDay(state.currentDate);
  html += '<div class="form-block"><label>'+state.currentDate+' の体重(kg)</label><input type="number" step="0.1" id="weightInput" value="'+(day.weight||'')+'"></div>';
  html += '<button class="savebtn" id="saveWeightBtn">保存する</button>';
  html += '<div class="section-title"><span class="bar"></span>記録履歴</div>';
  const allDates = Object.keys(state.days).filter(d=>state.days[d].weight!=null).sort().reverse().slice(0,20);
  if(allDates.length===0) html += '<div class="empty">まだ記録がありません</div>';
  else html += allDates.map(d=>'<div class="list-row"><span class="lrow-date">'+d+'</span><span class="lrow-w mono">'+state.days[d].weight+' kg</span></div>').join('');
  return html;
}

function renderHistory(){
  const dates = Object.keys(state.days).sort().reverse().slice(0,30);
  let html = '<div class="section-title"><span class="bar"></span>これまでの記録</div>';
  if(dates.length===0) return html + '<div class="empty">まだ記録がありません</div>';
  html += dates.map(d=>{
    const day = state.days[d];
    const intake = day.meals.reduce((s,m)=>s+m.total,0);
    const t = day.weight ? tdee(day.weight) : null;
    const bal = t===null ? null : intake - t;
    const color = bal===null ? 'var(--ink-soft)' : (bal>0 ? 'var(--warn)' : 'var(--good)');
    return '<div class="list-row"><span class="lrow-date">'+fmtDate(d)+'<br><span class="mono" style="font-size:13px;color:var(--ink)">'+(day.weight?day.weight+'kg':'--')+'</span></span>'+
      '<span class="lrow-cal mono" style="color:'+color+'">'+(bal===null?'摂取 '+intake+'kcal':(bal>0?'+':'')+bal+' kcal')+'</span></div>';
  }).join('');
  return html;
}

function renderSettings(){
  const p = state.profile;
  let html = '<div class="section-title"><span class="bar"></span>プロフィール設定</div>';
  html += '<div class="form-block">';
  html += '<label>年齢</label><input type="number" id="setAge" value="'+p.age+'">';
  html += '<label>性別</label><select id="setGender"><option value="male" '+(p.gender==='male'?'selected':'')+'>男性</option><option value="female" '+(p.gender==='female'?'selected':'')+'>女性</option></select>';
  html += '<label>身長(cm)</label><input type="number" id="setHeight" value="'+p.heightCm+'">';
  html += '<label>活動レベル</label><select id="setActivity">'+ACTIVITY_LEVELS.map(a=>'<option value="'+a.id+'" '+(p.activity===a.id?'selected':'')+'>'+a.label+'</option>').join('')+'</select>';
  html += '</div><button class="savebtn" id="saveProfileBtn">保存する</button>';
  html += '<div class="sheet-note" style="padding:12px 20px 0;">消費カロリーはMifflin-St Jeor式による基礎代謝と活動レベルから推定した目安です。</div>';
  return html;
}

function renderNav(){
  const items = [
    {id:'home', icon:'⌂', label:'ホーム'},
    {id:'weight', icon:'⚖', label:'体重'},
    {id:'history', icon:'▤', label:'履歴'}
  ];
  return '<div class="navbar"><div class="navinner">' + items.map(i=>
    '<div class="navitem '+(state.view===i.id?'active':'')+'" data-nav="'+i.id+'"><span class="nicon">'+i.icon+'</span>'+i.label+'</div>'
  ).join('') + '</div></div>';
}

function renderSheet(){
  if(!state.pendingMeal) return '<div class="sheet-overlay" id="sheetOverlay"></div>';
  const pm = state.pendingMeal;
  const mt = MEAL_TYPES.find(m=>m.id===pm.mealType);
  let body;
  if(pm.status === 'loading'){
    body = '<div class="spinner-row">写真を解析中…</div>';
  } else if(pm.status === 'error'){
    body = '<div class="spinner-row">解析に失敗しました。手動で入力してください。</div>' + renderMealForm(pm);
  } else {
    body = '<div class="sheet-note" style="margin-bottom:10px;">AIの推定結果です。内容や数値は自由に編集できます。</div>' +
      (pm.comment ? '<div class="sheet-note" style="color:var(--accent-deep);margin-bottom:10px;">'+pm.comment+'</div>' : '') +
      renderMealForm(pm);
  }
  return '<div class="sheet-overlay open" id="sheetOverlay"><div class="sheet">'+
    '<h3>'+(mt?mt.label:'食事')+'を記録</h3>' + body +
    (pm.status !== 'loading' ? '<div class="sheet-btns"><button id="cancelMeal">キャンセル</button><button class="primary" id="confirmMeal">記録する</button></div>' : '') +
    '</div></div>';
}
function renderMealForm(pm){
  let html = pm.items.map((it,idx)=>
    '<div class="row"><input type="text" data-item-name="'+idx+'" value="'+it.name.replace(/"/g,'&quot;')+'">'+
    '<input type="number" data-item-cal="'+idx+'" value="'+it.calories+'">'+
    '<span class="rowdel" data-item-del="'+idx+'">×</span></div>'
  ).join('');
  html += '<div class="addrow" id="addItemRow">+ 品目を追加</div>';
  return html;
}

function attachEvents(){
  document.getElementById('settingsBtn').addEventListener('click', ()=>{ state.view='settings'; render(); });
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click', ()=>{ state.view = el.dataset.nav; render(); }));

  if(state.view==='home'){
    const qw = document.getElementById('quickWeight');
    qw.addEventListener('change', ()=>{
      const v = parseFloat(qw.value);
      if(!isNaN(v)){ getDay(state.currentDate).weight = v; save(); render(); }
    });
    document.querySelectorAll('[data-meal]').forEach(el=>el.addEventListener('click', ()=>{
      window.__mealType = el.dataset.meal;
      document.getElementById('cameraInput').click();
    }));
    document.querySelectorAll('[data-delmeal]').forEach(el=>el.addEventListener('click', ()=>{
      const day = getDay(state.currentDate);
      day.meals = day.meals.filter(m=>m.id!==el.dataset.delmeal);
      save(); render();
    }));
    const genBtn = document.getElementById('genAdvice');
    if(genBtn) genBtn.addEventListener('click', generateAdvice);
    const refreshBtn = document.getElementById('refreshAdvice');
    if(refreshBtn) refreshBtn.addEventListener('click', generateAdvice);
  }

  if(state.view==='weight'){
    document.getElementById('saveWeightBtn').addEventListener('click', ()=>{
      const v = parseFloat(document.getElementById('weightInput').value);
      if(!isNaN(v)){ getDay(state.currentDate).weight = v; save(); render(); }
    });
  }

  if(state.view==='settings'){
    document.getElementById('saveProfileBtn').addEventListener('click', ()=>{
      state.profile.age = parseInt(document.getElementById('setAge').value) || state.profile.age;
      state.profile.gender = document.getElementById('setGender').value;
      state.profile.heightCm = parseFloat(document.getElementById('setHeight').value) || state.profile.heightCm;
      state.profile.activity = document.getElementById('setActivity').value;
      save();
      state.view = 'home';
      render();
    });
  }

  const overlay = document.getElementById('sheetOverlay');
  if(overlay){
    overlay.addEventListener('click', e=>{ if(e.target.id==='sheetOverlay'){ state.pendingMeal=null; render(); } });
  }
  const cancelBtn = document.getElementById('cancelMeal');
  if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ state.pendingMeal=null; render(); });
  const confirmBtn = document.getElementById('confirmMeal');
  if(confirmBtn) confirmBtn.addEventListener('click', ()=>{
    const pm = state.pendingMeal;
    if(pm.items.length===0) return;
    const total = pm.items.reduce((s,it)=>s+(parseFloat(it.calories)||0),0);
    const day = getDay(state.currentDate);
    day.meals.push({ id:'m-'+Date.now(), mealType:pm.mealType, time:pm.time, items:pm.items, total:Math.round(total), comment:pm.comment||'' });
    save();
    state.pendingMeal = null;
    render();
  });
  document.querySelectorAll('[data-item-name]').forEach(el=>el.addEventListener('input', ()=>{
    state.pendingMeal.items[parseInt(el.dataset.itemName)].name = el.value;
  }));
  document.querySelectorAll('[data-item-cal]').forEach(el=>el.addEventListener('input', ()=>{
    state.pendingMeal.items[parseInt(el.dataset.itemCal)].calories = parseFloat(el.value) || 0;
  }));
  document.querySelectorAll('[data-item-del]').forEach(el=>el.addEventListener('click', ()=>{
    state.pendingMeal.items.splice(parseInt(el.dataset.itemDel),1);
    render();
  }));
  const addRow = document.getElementById('addItemRow');
  if(addRow) addRow.addEventListener('click', ()=>{
    state.pendingMeal.items.push({ name:'', calories:0 });
    render();
  });
}

document.getElementById('cameraInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const mealType = window.__mealType;
  const now = new Date();
  const timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  state.pendingMeal = { mealType, time:timeStr, status:'loading', items:[], comment:'' };
  render();

  try{
    const base64 = await resizeToBase64(file);
    const result = await analyzePhoto(base64);
    state.pendingMeal.status = 'ready';
    state.pendingMeal.items = result.items;
    state.pendingMeal.comment = result.comment;
  }catch(err){
    console.error(err);
    state.pendingMeal.status = 'error';
    state.pendingMeal.items = [{ name:'', calories:0 }];
    state.pendingMeal.comment = '';
  }
  render();
});

function resizeToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 700;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.6).split(',')[1]);
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function generateAdvice(){
  const day = getDay(state.currentDate);
  const weight = day.weight;
  const intake = dayIntake(state.currentDate);
  const t = weight ? tdee(weight) : null;
  const prevWeight = recentWeight(prevDateStr(state.currentDate));
  const mealsText = day.meals.length
    ? day.meals.map(m=>{ const mt=MEAL_TYPES.find(x=>x.id===m.mealType); return (mt?mt.label:'食事')+':'+m.items.map(it=>it.name).join('、')+'('+m.total+'kcal)'; }).join(' / ')
    : 'まだ記録なし';

  state.adviceLoading = true;
  render();

  const summary = '30-40代男性のダイエット記録。年齢'+state.profile.age+'歳、身長'+state.profile.heightCm+'cm、体重'+(weight||'未入力')+'kg'+
    (prevWeight && weight ? '(前回記録から'+(weight-prevWeight>=0?'+':'')+(Math.round((weight-prevWeight)*10)/10)+'kg)':'')+
    '。本日の摂取カロリー'+intake+'kcal、推定消費カロリー'+(t||'不明')+'kcal。食事内容: '+mealsText;

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:400,
        messages:[{ role:'user', content: summary + '\n\n上記のデータをもとに、このユーザーへ向けた今日のひとことアドバイスを日本語で2〜3文、120文字程度で書いてください。前置きなしで本文のみ、励ましも含めた実用的な内容にしてください。医療的な断定は避けてください。' }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(c=>c.text||'').join('').trim();
    day.advice = text || 'アドバイスを取得できませんでした。';
  }catch(err){
    console.error(err);
    day.advice = 'アドバイスの取得に失敗しました。しばらくしてからもう一度お試しください。';
  }
  state.adviceLoading = false;
  save();
  render();
}

function prevDateStr(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

async function analyzePhoto(base64){
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      messages:[{
        role:'user',
        content:[
          { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:base64 } },
          { type:'text', text:'この写真に写っている食事を分析してください。写っている料理・食品ごとに、日本語の名称と推定カロリー(kcal、整数)を返してください。あわせて、栄養バランスについて30-40代男性のダイエットに役立つ一言コメント(40文字程度、断定的な医療アドバイスは避ける)も付けてください。前置きや説明、Markdownの装飾は一切含めず、以下のJSON形式のみを出力してください: {"items":[{"name":"文字列","calories":数値}],"comment":"文字列"}' }
        ]
      }]
    })
  });
  const data = await response.json();
  const text = (data.content || []).map(c=>c.text||'').join('');
  const clean = text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  if(!parsed.items || !Array.isArray(parsed.items) || parsed.items.length===0) throw new Error('no items');
  return {
    items: parsed.items.map(it=>({ name:String(it.name||'').slice(0,40), calories:Math.round(Number(it.calories))||0 })),
    comment: parsed.comment ? String(parsed.comment).slice(0,80) : ''
  };
}
